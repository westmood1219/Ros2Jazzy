# config/embobot_controllers.yaml
# 注意：所有参数必须在 controller_manager 命名空间下，
# 否则 Jazzy 的 controller_manager 不会加载传给子控制器
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # 差速驱动控制器
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
      ros__parameters:
        cmd_vel_topic: /cmd_vel
        # cmd_vel 超时：超过此时间无新指令则自动停止
        cmd_vel_timeout: 0.5   # 秒，防止通信中断后机器人失控
      # 车轮名称
      left_wheel_names:  ['left_wheel_joint']
      right_wheel_names: ['right_wheel_joint']

      # 运动学参数
      wheel_separation: 0.160
      wheel_radius:     0.033

      # TF 坐标系（必须显式设置，Jazzy 默认 base_frame_id 为 base_link）
      base_frame_id: base_footprint
      odom_frame_id: odom
      enable_odom_tf: true

      # 速度指令格式
      use_stamped_vel: false

      # 速度和加速度限制
      linear.x.max_velocity:  0.5
      linear.x.min_velocity: -0.5
      angular.z.max_velocity:  2.0
      angular.z.min_velocity: -2.0


    # 关节状态广播器（发布 /joint_states）
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
