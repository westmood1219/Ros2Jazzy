# config/embobot_controllers.yaml
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # 差速驱动控制器
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    # 关节状态广播器（发布 /joint_states）
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    left_wheel_names:  ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']

    wheel_separation: 0.160   # track_width
    wheel_radius:     0.033   # wheel_radius

    # 话题配置
    use_stamped_vel: false

    # 明确设置 TF 坐标系（Jazzy 默认 base_frame_id 是 base_link 不是 base_footprint）
    base_frame_id: base_footprint
    odom_frame_id: odom

    # 速度和加速度限制
    linear.x.max_velocity:  0.5
    linear.x.min_velocity: -0.5
    angular.z.max_velocity:  2.0
    angular.z.min_velocity: -2.0
